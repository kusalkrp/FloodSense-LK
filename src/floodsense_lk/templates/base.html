<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FloodSense LK{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080b14;
      --surface: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --text: #e2e8f0;
      --muted: rgba(255,255,255,0.4);
      --accent: #6366f1;
      --green: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --critical: #dc2626;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }
    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px); padding: 0 1.5rem;
      display: flex; align-items: center; gap: 2rem; height: 56px;
    }
    nav .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    nav a:hover, nav a.active { color: var(--text); }
    main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem;
      backdrop-filter: blur(8px);
    }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 600;
    }
    .badge-normal   { background: rgba(16,185,129,0.15); color: #10b981; }
    .badge-low      { background: rgba(99,102,241,0.15); color: #818cf8; }
    .badge-medium   { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .badge-high     { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .badge-critical { background: rgba(220,38,38,0.25);  color: #fca5a5; }
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:last-child td { border-bottom: none; }
    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text); }
    .section { margin-bottom: 1.5rem; }
    .refresh-note { font-size: 0.75rem; color: var(--muted); text-align: right; margin-top: 0.5rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <span class="logo">🌊 FloodSense LK</span>
    <a href="/dashboard" {% if active == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
    <a href="/dashboard/alerts" {% if active == 'alerts' %}class="active"{% endif %}>Alerts</a>
    <a href="/dashboard/system" {% if active == 'system' %}class="active"{% endif %}>System</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
