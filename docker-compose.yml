services:

  timescaledb:
    image: timescale/timescaledb:2.15.3-pg15
    container_name: floodsense_timescaledb
    env_file:
      - .env.local
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./src/floodsense_lk/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"    # offset — avoids conflict with mcp-lk-river-intel on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: floodsense_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"    # offset — avoids conflict with mcp-lk-river-intel on 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  floodsense:
    build: .
    container_name: floodsense_app
    env_file:
      - .env.local
    environment:
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    ports:
      - "8002:8002"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"    # reach MCP server on host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  timescale_data:
  redis_data:
